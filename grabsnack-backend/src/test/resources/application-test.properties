# Test Database — separate schema, recreated on each test run
spring.datasource.url=jdbc:mysql://localhost:3306/grabsnack_test_db?createDatabaseIfNotExist=true&useUnicode=true&characterEncoding=UTF-8&serverTimezone=UTC
spring.datasource.username=root
